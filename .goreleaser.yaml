version: 2
project_name: clustertool
builds:
  - id: clustertool
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - freebsd
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.Version={{.Version}}  # Adjust path if necessary
gomod:
  dir: .
archives:
  - name_template: "{{.ProjectName}}_{{ .Version }}_{{.Os}}_{{.Arch}}"
checksum:
  name_template: "checksums.txt"
snapshot:
  name_template: "{{ incpatch .Version }}-next"
changelog:
  sort: asc
  filters:
    exclude:
      - '^Merge pull request #\d+ from'
      - "^docs"
      - "^test"
    include:
      - "clustertool"
      - "Clustertool"
      - "ClusterTool"
release:
  name_template: "{{.ProjectName}}-{{.Tag}}"
  github:
    owner: trueforge-org
    name: clustertool
  extra_files:
    - glob: "LICENSE"
  draft: false
  make_latest: false
  mode: append

git:
  ignore_tags:
    - nightly
    - common

universal_binaries:
  - replace: true

report_sizes: true

before:
  hooks:
    - chmod +x ./partial_builds/partial_build.sh
    - bash ./partial_builds/partial_build.sh
    - chmod +x ./embed/download_talosctl.sh
    - bash ./embed/download_talosctl.sh

# sboms:
#   - artifacts: archive
#   - id: source
#     artifacts: source

nfpms:
  - package_name: clustertool
    maintainer: "TrueForge <info@TrueForge.org>"
    homepage: "https://trueforge.org"
    description: "Tool to help bootstrap a Kubernetes cluster"
    license: "AGPL-3.0-only"
    vendor: TrueForge
    formats: [apk, deb, rpm, termux.deb, archlinux]

aurs:
  - name: "clustertool-bin"
    maintainers:
      - "TrueCharts <info@trueforge.org>"
    homepage: "https://trueforge.org"
    description: "Tool to help bootstrap a Kubernetes cluster"
    license: "AGPL-3.0-only"
    git_url: "ssh://aur@aur.archlinux.org/clustertool-bin.git"
    skip_upload: auto
    package: |
      # Install binary
      bsdtar -xvf clustertool_${pkgver}_linux_${CARCH}.tar.gz -C "${pkgdir}"
      install -Dm755 "${pkgdir}/clustertool" "${pkgdir}/usr/bin/clustertool"

      # Install license
      install -Dm644 "${pkgdir}/LICENSE" "${pkgdir}/usr/share/licenses/${pkgname}/LICENSE"
