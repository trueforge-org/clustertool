name: Automerge and Approve

on:
  workflow_run:
    workflows:
      - "clustertool-go-lint"
      - "clustertool-go-tests"
      - "Kubeconform"
      - "Pull Request: Install"
    types:
      - completed

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  approve:
    runs-on: ubuntu-latest
    steps:
      - name: Validate all PR workflow runs are completed and successful
        id: ci-gate
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          script: |
            const workflowRun = context.payload.workflow_run;
            const pr = workflowRun.pull_requests?.[0];

            if (!pr) {
              core.notice('workflow_run does not reference a pull request; skipping automerge logic.');
              core.setOutput('gate_status', 'no_pr');
              return;
            }

            const { owner, repo } = context.repo;
            const prNumber = pr.number;

            const prData = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            });

            const headSha = prData.data.head.sha;
            const prAuthor = prData.data.user?.login || '';
            core.info(`Checking PR #${prNumber} workflows for head SHA ${headSha}`);
            core.info(`PR author: ${prAuthor}`);

            const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
              owner,
              repo,
              event: 'pull_request',
              head_sha: headSha,
              per_page: 100,
            });

            if (runs.length === 0) {
              core.notice(`No pull_request workflow runs found yet for PR #${prNumber} (${headSha}); waiting for next trigger.`);
              core.setOutput('gate_status', 'waiting');
              return;
            }

            const pending = runs.filter((run) => run.status !== 'completed');
            const failing = runs.filter(
              (run) =>
                run.status === 'completed' &&
                !['success', 'skipped', 'neutral'].includes(run.conclusion || '')
            );

            if (pending.length > 0) {
              core.info('Pending workflow runs:');
              for (const run of pending) {
                core.info(`- ${run.name} (${run.status})`);
              }
              core.notice('Not all pull_request workflow runs are completed yet; will wait for next trigger.');
              core.setOutput('gate_status', 'waiting');
              return;
            }

            if (failing.length > 0) {
              core.info('Failing workflow runs:');
              for (const run of failing) {
                core.info(`- ${run.name} (${run.conclusion})`);
              }
              core.notice('One or more pull_request workflow runs did not succeed yet; automerge will remain blocked until checks are green.');
              core.setOutput('gate_status', 'blocked');
              return;
            }

            core.setOutput('pr_number', String(prNumber));
            core.setOutput('pr_author', prAuthor);
            core.setOutput('gate_status', 'ready');
            core.info('All pull_request workflow runs are completed and successful.');

      - name: Approve PR
        uses: hmarr/auto-approve-action@v3
        if: steps.ci-gate.outputs.gate_status == 'ready' && steps.ci-gate.outputs.pr_author == 'truecharts-admin'
        with:
          github-token: "${{ secrets.OR_PAT }}"
          review-message: "Auto approved automated PR"
          pull-request-number: ${{ steps.ci-gate.outputs.pr_number }}

      - name: Automerge
        if: steps.ci-gate.outputs.gate_status == 'ready' && steps.ci-gate.outputs.pr_author == 'truecharts-admin'
        uses: pascalgn/automerge-action@7961b8b5eec56cc088c140b56d864285eabd3f67 # v0.16.4
        env:
          GITHUB_TOKEN: "${{ secrets.BOT_TOKEN }}"
          UPDATE_RETRIES: 24
          UPDATE_RETRY_SLEEP: 60000
          MERGE_METHOD: "squash"