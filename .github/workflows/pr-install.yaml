name: "Pull Request: Install"

on:
  workflow_dispatch:
  pull_request:
#    paths:
#      - "**/helm-release.yaml"

jobs:
  detect:
    name: Detect changed HelmReleases
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      tested: ${{ steps.set.outputs.tested }}
      skipped: ${{ steps.set.outputs.skipped }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Detect changed HelmReleases
        id: set
        run: |
          files=$(git diff \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.sha }}" \
            --name-only | grep 'helm-release.yaml$' || true)
          
          if [ -z "$files" ]; then
            echo "🔍 No HelmReleases changed"
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          echo "🔍 Detected HelmReleases:"
          printf '%s\n' "$files"
          
          # --------------------------------------------------
          # Filter releases using YAML skip list
          # --------------------------------------------------

          mapfile -t files_array <<< "$files"

          filtered=()
          skipped=()

          SKIP_FILE="ci/.config.yaml"

          if [ -f "$SKIP_FILE" ]; then
            mapfile -t skip_list < <(yq -r '.skipList[]' "$SKIP_FILE")
          else
            skip_list=()
          fi

          for file in "${files_array[@]}"; do
            dir=$(dirname "$file")
            skip=false

            for skip_entry in "${skip_list[@]}"; do
              if [ "$dir" = "$skip_entry" ]; then
                skip=true
                break
              fi
            done

            if [ "$skip" = true ]; then
              skipped+=("$file")
            else
              filtered+=("$file")
            fi
          done


          echo ""
          echo "===== HelmRelease CI scan result ====="

          if [ ${#skipped[@]} -gt 0 ]; then
            echo "⏭️ Skipped:"
            printf '  - %s\n' "${skipped[@]}"
          else
            echo "⏭️ Skipped: none"
          fi

          if [ ${#filtered[@]} -gt 0 ]; then
            echo "🧪 To test:"
            printf '  - %s\n' "${filtered[@]}"
          else
            echo "🧪 To test: none"
          fi
          echo "======================================"
          echo ""

          # ---------- GitHub job summary ----------
          {
            echo "## HelmRelease CI result"
            echo ""
            echo "### ⏭️ Skipped"
            if [ ${#skipped[@]} -gt 0 ]; then
              printf -- "- %s\n" "${skipped[@]}"
            else
              echo "_none_"
            fi
            echo ""
            echo "### 🧪 To test"
            if [ ${#filtered[@]} -gt 0 ]; then
              printf -- "- %s\n" "${filtered[@]}"
            else
              echo "_none_"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          # ---------- Prepare Outputs ----------

          tested_list="_none_"
          skipped_list="_none_"

          if [ ${#filtered[@]} -gt 0 ]; then
            tested_list=$(printf '%s\n' "${filtered[@]}")
          fi

          if [ ${#skipped[@]} -gt 0 ]; then
            skipped_list=$(printf '%s\n' "${skipped[@]}")
          fi

          {
            echo "tested<<EOF"
            echo "$tested_list"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "skipped<<EOF"
            echo "$skipped_list"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          # ---------- Matrix handling ----------

          if [ ${#filtered[@]} -eq 0 ]; then
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          json=$(printf '%s\n' "${filtered[@]}" | jq -R . | jq -s .)

          {
            echo "matrix<<EOF"
            echo "$json"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  test:
    needs: detect
    name: Test HelmReleases
    if: needs.detect.outputs.matrix != '[]'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        helmrelease: ${{ fromJson(needs.detect.outputs.matrix) }}

    steps:
      # --------------------------------------------------
      # Checkout repo
      # --------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      # --------------------------------------------------
      # Install required CLI tools
      # --------------------------------------------------
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq gettext
          sudo curl -sSL https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 \
            -o /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

      # --------------------------------------------------
      # Dummy env vars for Helm interpolation
      # --------------------------------------------------
      - name: Load dummy env vars from config
        run: |
          yq e '.dummyEnv | to_entries | .[] | "\(.key)=\(.value)"' ci/.config.yaml >> $GITHUB_ENV

          
          
      # --------------------------------------------------
      # Create ephemeral k3d cluster
      # --------------------------------------------------
      - name: Install kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5

      - name: Install helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v4.2.2

      - name: Create k3d cluster
        uses: nolar/setup-k3d-k3s@v1
        with:
          version: latest
          k3d-args: --k3s-arg --disable=metrics-server@server:*
          # github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove node taints
        run: |
          kubectl taint --all=true nodes node.cloudprovider.kubernetes.io/uninitialized- || true

      # --------------------------------------------------
      # Deploy & test HelmRelease
      # --------------------------------------------------
      - name: Test HelmRelease
        run: |
          chmod +x .github/scripts/deploy_helmrelease.sh
          bash .github/scripts/deploy_helmrelease.sh "${{ matrix.helmrelease }}"

  test-summary:
    name: Summary
    runs-on: ubuntu-latest
    needs:
      - detect
      - test
    if: always()

    steps:
      - name: Build GitHub summary
        run: |
          {
            echo "## HelmRelease test summary"
            echo ""

            echo "### Detect job"
            echo "- Result: **${{ needs.detect.result }}**"
            echo ""

            echo "### Test matrix job"
            echo "- Result: **${{ needs.test.result }}**"
            echo ""

            if [ "${{ needs.test.result }}" = "skipped" ]; then
              echo "ℹ️ No HelmReleases required testing."
            elif [ "${{ needs.test.result }}" = "success" ]; then
              echo "✅ All HelmRelease tests passed."
            else
              echo "❌ One or more HelmRelease tests failed."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
      - name: Add PR Comment
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: mshick/add-pr-comment@9302b90c1c7d26c4aebe20b7846b4a8a434bee94
        with:
          repo-token: ${{ steps.app-token.outputs.token }}
          message-id: "${{ github.event.pull_request.number }}/helmrelease-tests"
          header: "HelmRelease CI"
          message: |
            ## 🚀 HelmRelease CI Report

            ### Overall Status

            | Stage | Result |
            |-------|--------|
            | 🔍 Detect HelmReleases | **${{ needs.detect.result }}** |
            | 🧪 Helm Tests | **${{ needs.test.result }}** |

            ---

            ### 🧪 HelmReleases Tested

            ${{ needs.detect.outputs.tested }}

            ---

            ### ⏭️ HelmReleases Skipped

            ${{ needs.detect.outputs.skipped }}

            ---

            ### Result

            ${{ needs.test.result == 'skipped' && 'ℹ️ **No HelmReleases required testing**' || '' }}

            ${{ needs.test.result == 'success' && '✅ **All HelmRelease tests passed**' || '' }}

            ${{ needs.test.result == 'failure' && '❌ **One or more HelmRelease tests failed**\n\nCheck workflow logs for details.' || '' }}

            ${{ needs.test.result == 'cancelled' && '⚠️ **Tests were cancelled**' || '' }}

      - name: Enforce final status
        run: |
          # Detect must succeed
          if [ "${{ needs.detect.result }}" != "success" ]; then
            echo "Detect job failed"
            exit 1
          fi

          # Test may be success OR skipped (no releases changed)
          if [ "${{ needs.test.result }}" != "success" ] && \
             [ "${{ needs.test.result }}" != "skipped" ]; then
            echo "HelmRelease tests failed"
            exit 1
          fi

          echo "All checks passed"

  
