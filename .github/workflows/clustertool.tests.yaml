name: clustertool-go-tests
on:
  pull_request:
permissions:
  contents: read
jobs:

  check_changes:
    runs-on: ubuntu-latest
    outputs:
      changes_detected: ${{ steps.filter.outputs.changed }}

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          list-files: json
          filters: |
            changed:
            - '**/*.go'

  build:
    needs: check_changes
    runs-on:
      group: default    
    if: needs.check_changes.outputs.changes_detected == 'true'
    steps:
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: stable
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - run:  |
          set -euo pipefail

          run_cmd() {
            echo ""
            echo "============================================================"
            echo "== $1"
            echo "============================================================"
            shift
            "$@"
          }

          run_cmd "Build binary" go build -o ./clustertool
          run_cmd "Run Go tests" go test -v ./... -race -covermode=atomic
          run_cmd "Binary info smoke check" ./clustertool info
      - name: Init + Genconfig + SOPS roundtrip
        run: |
          set -euo pipefail

          run_cmd() {
            echo ""
            echo "------------------------------------------------------------"
            echo "[ROUNDTRIP] $1"
            echo "------------------------------------------------------------"
            shift
            "$@"
          }

          workdir="${RUNNER_TEMP}/clustertool-roundtrip"
          run_cmd "Reset temp workspace" rm -rf "$workdir"
          run_cmd "Create temp workspace" mkdir -p "$workdir"
          run_cmd "Copy binary to temp workspace" cp ./clustertool "$workdir/"

          pushd "$workdir" >/dev/null

          # First init creates base files and clusterenv skeleton.
          run_cmd "Initial init" ./clustertool init

          # Fill required values so second init passes strict validation.
          run_cmd "Set DOMAIN_0 dummy value" sed -i 's/^DOMAIN_0: ".*"/DOMAIN_0: "dummy.local"/' clusters/main/clusterenv.yaml
          run_cmd "Set DOMAIN_0_EMAIL dummy value" sed -i 's/^DOMAIN_0_EMAIL: ".*"/DOMAIN_0_EMAIL: "admin@dummy.local"/' clusters/main/clusterenv.yaml
          run_cmd "Set DOMAIN_0_CLOUDFLARE_TOKEN dummy value" sed -i 's/^DOMAIN_0_CLOUDFLARE_TOKEN: ".*"/DOMAIN_0_CLOUDFLARE_TOKEN: "dummy-token"/' clusters/main/clusterenv.yaml
          run_cmd "Set GITHUB_REPOSITORY dummy value" sed -i 's|^GITHUB_REPOSITORY: ".*"|GITHUB_REPOSITORY: "https://github.com/trueforge-org/clustertool.git"|' clusters/main/clusterenv.yaml

          # Second init runs full generation flow with populated env.
          run_cmd "Second init" ./clustertool init

          # Config generation must succeed with dummy values.
          run_cmd "Generate config" ./clustertool genconfig

          # Validate expected generated artifacts.
          run_cmd "Check clusterenv exists" test -f clusters/main/clusterenv.yaml
          run_cmd "Check talconfig exists" test -f clusters/main/talos/talconfig.yaml
          run_cmd "Check talosconfig exists" test -f clusters/main/talos/generated/talosconfig
          run_cmd "Check talsecret exists" test -f clusters/main/talos/generated/talsecret.yaml
          run_cmd "Check clustersettings secret exists" test -f clusters/main/kubernetes/flux-system/flux/clustersettings.secret.yaml
          run_cmd "Check at least one node machine config exists" bash -c 'find clusters/main/talos/generated -maxdepth 1 -type f -name "*.yaml" ! -name "talsecret.yaml" | grep -q .'

          popd >/dev/null

      - name: SOPS roundtrip (encrypt/decrypt/checkcrypt)
        run: |
          set -euo pipefail

          run_cmd() {
            echo ""
            echo "------------------------------------------------------------"
            echo "[SOPS] $1"
            echo "------------------------------------------------------------"
            shift
            "$@"
          }

          workdir="${RUNNER_TEMP}/clustertool-roundtrip"
          run_cmd "Verify temp workspace exists" test -d "$workdir"
          pushd "$workdir" >/dev/null

          run_cmd "Encrypt files" ./clustertool encrypt
          run_cmd "Check encrypted state" ./clustertool checkcrypt
          run_cmd "Decrypt files" ./clustertool decrypt
          run_cmd "Encrypt files again" ./clustertool encrypt
          run_cmd "Re-check encrypted state" ./clustertool checkcrypt

          popd >/dev/null
